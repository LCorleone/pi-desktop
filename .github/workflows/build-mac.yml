name: Build (macOS)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS (Intel x86_64)
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run tauri build

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: Pi-Desktop-macos-x86_64
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Unsigned build notice
        run: |
          echo "## macOS build ready (unsigned)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the artifact, mount the .dmg, and drag **Pi Desktop** to Applications." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Because the app is unsigned, macOS will block first launch. Remove the quarantine attribute:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "xattr -cr \"/Applications/Pi Desktop.app\"" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
