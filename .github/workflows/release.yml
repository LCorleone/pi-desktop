name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis"
            os_name: "Windows"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Resolve tag
        id: release_tag
        shell: bash
        run: |
          TAG="manual-build-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and publish (${{ matrix.os_name }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release_tag.outputs.tag }}
          releaseName: "Pi Desktop ${{ steps.release_tag.outputs.tag }}"
          releaseBody: |
            Manual Windows build.
          releaseDraft: true
          prerelease: false
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
