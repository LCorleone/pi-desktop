name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: Windows
            artifact_name: Pi-Desktop-Windows
            # Native build (no --target needed)
            tauri_build_args: ""
            bundle_glob: "src-tauri/target/release/bundle/nsis/*.exe"

          - platform: macos-latest
            os_name: macOS
            artifact_name: Pi-Desktop-macOS
            # Cross-compile x86_64 on Apple Silicon runner
            tauri_build_args: "--target x86_64-apple-darwin"
            bundle_glob: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        # Only add x86_64-apple-darwin target on macOS
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build (${{ matrix.os_name }})
        shell: bash
        run: |
          if [ -n "${{ matrix.tauri_build_args }}" ]; then
            npm run tauri build -- ${{ matrix.tauri_build_args }}
          else
            npm run tauri build
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-build-${{ github.run_number }}
          name: Pi Desktop manual-build-${{ github.run_number }}
          body: |
            Windows `.exe` + macOS `.dmg` (unsigned). Manual build from `july-dev`.
          draft: true
          prerelease: false
          files: |
            artifacts/**/*
