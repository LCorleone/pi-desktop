<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0f1117"/>

  <!-- Subtle radial glow behind pi -->
  <circle cx="512" cy="400" r="360" fill="#1a1e28" opacity="0.6"/>

  <!-- Pi monogram — geometric construction, larger and cleaner -->
  <g fill="#FFFFFF" transform="matrix(0.84 0 0 0.84 131 88)">
    <!-- Top bar -->
    <rect x="165" y="165" width="435" height="85" rx="14"/>
    <!-- Left leg -->
    <rect x="165" y="165" width="85" height="555" rx="14"/>
    <!-- Right leg -->
    <rect x="515" y="165" width="85" height="555" rx="14"/>
    <!-- Bridge segment (horizontal gap in left leg) -->
    <rect x="165" y="390" width="200" height="85" rx="14"/>
  </g>

  <!-- Separator line -->
  <rect x="360" y="730" width="304" height="4" rx="2" fill="#FFFFFF" opacity="0.25"/>

  <!-- DESK — clean geometric caps -->
  <g fill="#FFFFFF">
    <!-- D -->
    <rect x="230" y="770" width="26" height="130" rx="5"/>
    <rect x="256" y="770" width="70" height="26" rx="5"/>
    <rect x="256" y="874" width="70" height="26" rx="5"/>
    <rect x="326" y="796" width="26" height="78" rx="5"/>

    <!-- E -->
    <rect x="378" y="770" width="26" height="130" rx="5"/>
    <rect x="404" y="770" width="78" height="26" rx="5"/>
    <rect x="404" y="822" width="52" height="26" rx="5"/>
    <rect x="404" y="874" width="78" height="26" rx="5"/>

    <!-- S -->
    <rect x="508" y="770" width="78" height="26" rx="5"/>
    <rect x="508" y="796" width="26" height="26" rx="5"/>
    <rect x="534" y="822" width="52" height="26" rx="5"/>
    <rect x="560" y="848" width="26" height="26" rx="5"/>
    <rect x="508" y="874" width="78" height="26" rx="5"/>

    <!-- K -->
    <rect x="612" y="770" width="26" height="130" rx="5"/>
    <rect x="638" y="822" width="52" height="26" rx="5"/>
    <rect x="664" y="770" width="26" height="52" rx="5"/>
    <rect x="664" y="848" width="26" height="52" rx="5"/>
  </g>
</svg>