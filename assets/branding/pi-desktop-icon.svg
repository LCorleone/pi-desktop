<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- Classic π — two legs under a top bar, unmistakable -->
  <g fill="#FFFFFF">
    <!-- Top bar (full width) -->
    <rect x="160" y="260" width="704" height="104" rx="30"/>

    <!-- Left leg (starts below top bar) -->
    <rect x="160" y="364" width="104" height="420" rx="30"/>

    <!-- Right leg (starts below top bar) -->
    <rect x="760" y="364" width="104" height="420" rx="30"/>
  </g>
</svg>